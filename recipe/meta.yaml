{% set name = "wagtail-inventory" %}
{% set version = "3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: f079afbdb8a7d6f98fbe0d23887867807d980faff9e3b0cbd44c9beb378e1610

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=43.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - tqdm >=4.15.0,<5
    - wagtail >=6.2
    - django-autocomplete-light >=3.9

test:
  imports:
    - wagtailinventory
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Wagtail report to filter pages by block content
  home: https://github.com/cfpb/wagtail-inventory
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
